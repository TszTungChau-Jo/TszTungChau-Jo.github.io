<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About | Joshua Chau</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sidebar Toggle Button -->
  <button id="sidebarToggle" class="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
  <!-- Mobile Backdrop -->
  <div id="sidebarBackdrop" class="backdrop"></div>

  <header class="sidebar">
    <h2>Joshua Chau</h2>
    <nav>
      <a href="index.html" class="active">About</a>
      <a href="journal.html">Journal</a>
    </nav>
  </header>

  <div class="content-wrapper">

  <main>
    <section class="intro">
      <h1>Hi, I’m Joshua Chau 👋</h1>
      <p>
        I'm a Computer Engineering student at the University of Toronto.  
        I’m curious about how technology shapes our world.
      </p>
    </section>
  </main>

  <footer>
  © <span id="year"></span> Joshua Chau ·
    <a href="mailto:joshuatt.chau@mail.utoronto.ca">Contact</a> ·
    <a href="https://github.com/TszTungChau-Jo" target="_blank">GitHub</a>
  </footer>

  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    // Sidebar toggle logic
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarBackdrop = document.getElementById('sidebarBackdrop');

    function toggleSidebar() {
      const isMobile = window.innerWidth <= 768;
      if (isMobile) {
        document.body.classList.toggle('sidebar-open');
        sidebarToggle.textContent = document.body.classList.contains('sidebar-open') ? '✕' : '☰';
      } else {
        document.body.classList.toggle('sidebar-collapsed');
      }
    }

    sidebarToggle.addEventListener('click', toggleSidebar);
    if (sidebarBackdrop) {
      sidebarBackdrop.addEventListener('click', () => {
        document.body.classList.remove('sidebar-open');
        sidebarToggle.textContent = '☰';
      });
    }

    // Reset state on resize
    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) {
        document.body.classList.remove('sidebar-open');
        sidebarToggle.textContent = '☰';
      }
    });
  </script>
</body>
</html>
